server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # WebSocket proxy to ai-worker
    location /radar-viz/api/airspace/ws {
        proxy_pass http://ai-worker:8000/airspace/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
    }

    location /api/airspace/ws {
        proxy_pass http://ai-worker:8000/airspace/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
    }

    # API proxy to ai-worker (both /api/ and /radar-viz/api/)
    location /radar-viz/api/ {
        proxy_pass http://ai-worker:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
    }

    location /api/ {
        proxy_pass http://ai-worker:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
    }

    # Static assets under /radar-viz/
    location /radar-viz/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /radar-viz/index.html;
    }

    # SPA fallback for root
    location / {
        try_files $uri $uri/ /index.html;
    }
}
